<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRT · Audit Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f7;--s1:#ffffff;--s2:#f5f6fa;--s3:#eaedf5;
  --bd:#d4d8e8;--text:#1a1d2e;--muted:#6e7490;
  --accent:#3d6ef5;--green:#0aaa76;--yellow:#c98a00;--red:#d92040;--orange:#d95820;--purple:#7040d8;
  --wrap:#3d6ef5;--grs:#0aaa76;--wse:#c98a00;--other:#7040d8;--na:#8090a8;
  --cert:#3d6ef5;--report:#0aaa76;--sop:#c98a00;--knowhow:#7040d8;--consult:#d95820;--process:#0888b8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* ── HEADER ── */
header{padding:14px 24px;border-bottom:1px solid var(--bd);background:#fff;display:flex;align-items:center;gap:14px;flex-shrink:0}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:.03em}
.logo em{color:var(--accent);font-style:normal}
.hright{margin-left:auto;display:flex;gap:8px;align-items:center}
.hbtn{padding:6px 14px;border-radius:7px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;border:1px solid var(--bd);background:transparent;color:var(--muted);transition:all .15s}
/* API key bar */
#apikey-bar{display:flex;align-items:center;gap:10px;padding:9px 24px;background:#fffbeb;border-bottom:2px solid #f0c040;flex-shrink:0}
#apikey-bar.ok{background:#f0fdf8;border-bottom-color:var(--green)}
#apikey-bar .ak-label{font-size:11px;color:#7a6000;white-space:nowrap;font-weight:600}
#apikey-bar.ok .ak-label{color:#0a6040}
#ak-input{flex:1;max-width:360px;background:#fff;border:1px solid #e0cc80;border-radius:7px;padding:6px 12px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);outline:none;letter-spacing:.04em}
#apikey-bar.ok #ak-input{border-color:#80d4b0}
#ak-input:focus{border-color:var(--accent)}
#ak-save{padding:6px 14px;border-radius:7px;background:var(--accent);border:none;color:#fff;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;white-space:nowrap}
#ak-status{font-size:11px;color:var(--muted)}
.hbtn:hover{border-color:var(--text);color:var(--text)}
.hbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff;opacity:.35;pointer-events:none}
.hbtn.primary.on{opacity:1;pointer-events:auto}

/* ── AUDIT TYPE FILTER BAR ── */
#type-bar{
  display:flex;align-items:center;gap:0;
  background:#fff;border-bottom:1px solid var(--bd);
  padding:0 24px;flex-shrink:0;overflow-x:auto;
}
.type-tab{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:12px 22px;cursor:pointer;border-bottom:3px solid transparent;
  transition:all .15s;white-space:nowrap;min-width:90px;
}
.type-tab:hover{background:rgba(255,255,255,.02)}
.type-tab.active{border-bottom-color:currentColor}
.type-tab .tt-label{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:.04em}
.type-tab .tt-count{font-size:10px;opacity:.6}
.type-tab.t-all{color:var(--text)}
.type-tab.t-all.active{border-bottom-color:var(--text)}
.type-tab.t-WRAP{color:var(--wrap)}
.type-tab.t-GRS{color:var(--grs)}
.type-tab.t-WSE{color:var(--wse)}
.type-tab.t-OTHER{color:var(--other)}
.type-tab.t-NA{color:var(--na)}
.type-divider{width:1px;height:36px;background:var(--bd);margin:0 4px;flex-shrink:0}

/* year strip */
#year-bar{
  display:flex;align-items:center;gap:8px;
  background:#f5f6fa;border-bottom:1px solid var(--bd);
  padding:8px 24px;flex-shrink:0;flex-wrap:wrap;
}
.year-label{font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-right:4px}
.year-chip{
  padding:4px 13px;border-radius:20px;font-size:11px;cursor:pointer;
  border:1px solid var(--bd);color:var(--muted);background:transparent;
  font-family:'DM Mono',monospace;transition:all .15s;
}
.year-chip:hover{border-color:var(--text);color:var(--text)}
.year-chip.active{background:var(--s1);border-color:var(--accent);color:var(--accent)}
#year-bar.hidden{display:none}

/* progress */
#pbar{height:2px;background:var(--s2);display:none;flex-shrink:0}
#pfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .3s}

/* ── MAIN ── */
main{display:flex;flex:1;overflow:hidden}

/* ── LEFT ── */
#left{width:280px;min-width:280px;background:#fff;border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
#dropzone{margin:12px;border:2px dashed #b0b8d0;border-radius:12px;padding:22px 14px;text-align:center;cursor:pointer;position:relative;transition:all .2s;flex-shrink:0}
#dropzone:hover,#dropzone.over{border-color:var(--accent);background:rgba(91,138,255,.05)}
#file-input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dz-icon{font-size:26px;margin-bottom:7px}
.dz-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-bottom:4px}
.dz-sub{font-size:10px;color:var(--muted);line-height:1.6}
.fmt-row{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.fmt{font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid var(--bd);color:var(--muted)}

.qhdr{padding:8px 12px 5px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border-top:1px solid var(--bd);display:flex;align-items:center;flex-shrink:0}
.qcount{margin-left:auto;background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:1px 8px;font-size:10px}
#qlist{overflow-y:auto;flex:1;padding:0 8px 8px}
.qi{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;margin-bottom:3px;background:#f8f9fc;border:1px solid #dde0ec;font-size:11px;cursor:pointer;transition:all .15s}
.qi:hover,.qi.sel{border-color:var(--accent)}
.qi.dup{border-color:var(--orange);opacity:.8}
.qi.low{border-color:rgba(240,192,64,.5)}
.qi-icon{font-size:15px;flex-shrink:0}
/* audit type dot on queue item */
.qi-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.qi-info{flex:1;overflow:hidden}
.qi-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px}
.qi-meta{font-size:9px;color:var(--muted);margin-top:2px;display:flex;gap:5px;align-items:center}
.qi-typelbl{font-size:9px;font-weight:600;padding:1px 6px;border-radius:3px;letter-spacing:.04em}
.spill{font-size:9px;padding:2px 7px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.sp-p{background:rgba(90,96,112,.2);color:var(--muted);border:1px solid var(--bd)}
.sp-r{background:rgba(91,138,255,.15);color:var(--accent);border:1px solid rgba(91,138,255,.3)}
.sp-d{background:rgba(47,212,156,.12);color:var(--green);border:1px solid rgba(47,212,156,.3)}
.sp-l{background:rgba(240,192,64,.12);color:var(--yellow);border:1px solid rgba(240,192,64,.3)}
.sp-dup{background:rgba(240,120,64,.12);color:var(--orange);border:1px solid rgba(240,120,64,.3)}
.sp-e{background:rgba(240,80,96,.12);color:var(--red);border:1px solid rgba(240,80,96,.3)}

/* ── RIGHT ── */
#right{flex:1;overflow-y:auto;padding:18px 22px}

/* empty */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:50vh;gap:10px;opacity:.4;text-align:center}
.empty-ico{font-size:44px}.empty-t{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.empty-s{font-size:11px;color:var(--muted);max-width:300px;line-height:1.7}

/* ── RESULT CARD ── */
.rcard{background:var(--s1);border:1px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:12px;animation:fu .25s ease;transition:border-color .2s;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.rcard.dup{border-color:var(--orange)}.rcard.low{border-color:rgba(240,192,64,.5)}.rcard.accepted{opacity:.65}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* card header — big audit type stripe */
.ch{display:flex;align-items:stretch;cursor:pointer}
.ch:hover{background:rgba(255,255,255,.015)}
/* colored left stripe */
.ch-stripe{width:5px;flex-shrink:0;border-radius:0}
/* main content */
.ch-body{flex:1;display:flex;align-items:center;gap:10px;padding:12px 16px;overflow:hidden}
.ch-ico{font-size:17px;flex-shrink:0}
.ch-info{flex:1;overflow:hidden}
.ch-fname{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-sub{font-size:10px;color:var(--muted);margin-top:3px;display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.ch-right{display:flex;gap:6px;align-items:center;flex-shrink:0}

/* BIG audit type badge */
.at-badge{
  font-family:'Syne',sans-serif;font-weight:800;
  font-size:15px;letter-spacing:.06em;
  padding:5px 14px;border-radius:6px;white-space:nowrap;
}
.at-WRAP{background:rgba(61,110,245,.12);color:#2455d8;border:2px solid rgba(61,110,245,.5);font-weight:800}
.at-GRS{background:rgba(10,170,118,.1);color:#077a54;border:2px solid rgba(10,170,118,.5);font-weight:800}
.at-WSE{background:rgba(201,138,0,.1);color:#8a6000;border:2px solid rgba(201,138,0,.5);font-weight:800}
.at-OTHER{background:rgba(112,64,216,.1);color:#5030a8;border:2px solid rgba(112,64,216,.4);font-weight:800}
.at-NA{background:rgba(128,144,168,.12);color:#506070;border:2px solid rgba(128,144,168,.4);font-weight:800}
.at-unknown{background:var(--s2);color:var(--muted);border:2px solid var(--bd);font-size:11px}

/* smaller doc type badge */
.dt-badge{font-size:10px;padding:3px 9px;border-radius:4px;white-space:nowrap}
.dt-cert{background:rgba(91,138,255,.12);color:var(--cert);border:1px solid rgba(91,138,255,.25)}
.dt-report{background:rgba(47,212,156,.12);color:var(--report);border:1px solid rgba(47,212,156,.25)}
.dt-sop{background:rgba(240,192,64,.12);color:var(--sop);border:1px solid rgba(240,192,64,.25)}
.dt-knowhow{background:rgba(160,124,255,.12);color:var(--knowhow);border:1px solid rgba(160,124,255,.25)}
.dt-consult{background:rgba(240,120,64,.12);color:var(--consult);border:1px solid rgba(240,120,64,.25)}
.dt-process{background:rgba(64,192,240,.12);color:var(--process);border:1px solid rgba(64,192,240,.25)}
.dt-other{background:rgba(136,136,136,.12);color:#888;border:1px solid rgba(136,136,136,.2)}
.flag-dup{background:rgba(240,120,64,.12);color:var(--orange);border:1px solid rgba(240,120,64,.3);font-size:10px;padding:3px 9px;border-radius:4px}
.flag-low{background:rgba(240,192,64,.12);color:var(--yellow);border:1px solid rgba(240,192,64,.3);font-size:10px;padding:3px 9px;border-radius:4px}
/* shared doc */
.flag-shared{background:rgba(255,255,255,.07);color:var(--text);border:1px solid rgba(255,255,255,.18);font-size:10px;padding:3px 9px;border-radius:4px;letter-spacing:.04em}
.shared-info{background:#f5f7ff;border:1px solid #c0caee;border-radius:8px;padding:9px 13px;font-size:11px;color:var(--muted);margin-bottom:12px;display:flex;gap:8px;align-items:flex-start;line-height:1.6}
.shared-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}

/* card body */
.cb{padding:14px 16px;border-top:1px solid var(--bd)}
.spin{width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.analyzing-row{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted)}

.conf-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.conf-lbl{font-size:10px;color:var(--muted);width:130px;flex-shrink:0}
.conf-bar{flex:1;height:3px;background:var(--s3);border-radius:2px;overflow:hidden}
.conf-fill{height:100%;border-radius:2px}
.conf-pct{font-size:10px;width:36px;text-align:right;flex-shrink:0}

.warn-box{background:rgba(217,96,32,.07);border:1px solid rgba(217,96,32,.3);border-radius:8px;padding:9px 13px;font-size:11px;color:var(--orange);margin-bottom:12px;display:flex;gap:8px;line-height:1.6}
.low-box{background:rgba(201,138,0,.07);border:1px solid rgba(201,138,0,.3);border-radius:8px;padding:9px 13px;font-size:11px;color:var(--yellow);margin-bottom:12px;display:flex;gap:8px;line-height:1.6}
.sum-box{background:#f0f4ff;border:1px solid #c8d4f8;border-radius:8px;padding:10px 13px;font-size:11px;color:#3050a0;line-height:1.7;margin-bottom:12px;font-style:italic}

.dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.df .dl{font-size:9px;color:var(--muted);letter-spacing:.09em;text-transform:uppercase;margin-bottom:3px}
.df .dv{font-size:12px}
.sec-t{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--bd)}
.nc-list{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.nc-i{background:#fff5f6;border-left:2px solid var(--red);border-radius:0 6px 6px 0;padding:6px 11px;font-size:11px;line-height:1.5}
.nc-i.find{background:#f0f5ff;border-left-color:var(--accent)}

/* correction box */
.corr-box{background:#fafbff;border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:12px}
.corr-hdr{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.corr-hdr span{flex:1}.corr-ok{font-size:9px;color:var(--green)}
.corr-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.cf{display:flex;flex-direction:column;gap:4px}
.cl{font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
select.cs,input.ci{background:#fff;border:1px solid #c0c8dc;border-radius:6px;color:var(--text);font-family:'DM Mono',monospace;font-size:11px;padding:6px 9px;outline:none;transition:border-color .15s;width:100%}
select.cs:focus,input.ci:focus{border-color:var(--accent)}
select.cs option{background:var(--s3)}

.actions{display:flex;gap:7px;flex-wrap:wrap}
.abtn{padding:6px 13px;border-radius:6px;font-size:11px;cursor:pointer;font-family:'DM Mono',monospace;transition:all .15s;border:1px solid var(--bd);background:transparent;color:var(--muted)}
.abtn:hover{border-color:var(--accent);color:var(--accent)}
.abtn.acc{background:rgba(47,212,156,.1);border-color:rgba(47,212,156,.3);color:var(--green)}
.abtn.acc:hover{background:rgba(47,212,156,.2)!important}
.abtn.del:hover{border-color:var(--red)!important;color:var(--red)!important}

/* filter empty */
.filter-empty{text-align:center;padding:50px 20px;color:var(--muted);font-size:12px}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#bbbfcc;border-radius:2px}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div>
    <div class="logo">VRT · <em>Audit</em> Analyzer</div>
    <div style="font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.08em;text-transform:uppercase">AI 文件識別 · 分類 · 去重</div>
  </div>
  <div class="hright">
    <button class="hbtn" onclick="clearAll()">清除全部</button>
    <button class="hbtn primary" id="exp-btn" onclick="doExport()">匯出已歸檔</button>
  </div>
</header>

<!-- API KEY BAR -->
<div id="apikey-bar">
  <span class="ak-label" id="ak-label">⚠ 需要 Gemini API Key 才能分析</span>
  <input id="ak-input" type="text" placeholder="貼上 AIzaSy… 完整 Key" autocomplete="off" spellcheck="false" style="letter-spacing:.02em">
  <button id="ak-save" onclick="saveKey()">儲存</button>
  <button id="ak-test" onclick="testKey()" style="padding:6px 12px;border-radius:7px;background:transparent;border:1px solid var(--bd);color:var(--muted);font-family:DM Mono,monospace;font-size:11px;cursor:pointer">測試</button>
  <span id="ak-status"></span>
</div>

<!-- AUDIT TYPE FILTER BAR -->
<div id="type-bar">
  <div class="type-tab t-all active" onclick="setTypeFilter('ALL',this)">
    <div class="tt-label">全部</div>
    <div class="tt-count" id="tc-ALL">0 份</div>
  </div>
  <div class="type-divider"></div>
  <div class="type-tab t-WRAP" onclick="setTypeFilter('WRAP',this)">
    <div class="tt-label">WRAP</div>
    <div class="tt-count" id="tc-WRAP">0 份</div>
  </div>
  <div class="type-tab t-GRS" onclick="setTypeFilter('GRS',this)">
    <div class="tt-label">GRS</div>
    <div class="tt-count" id="tc-GRS">0 份</div>
  </div>
  <div class="type-tab t-WSE" onclick="setTypeFilter('WSE',this)">
    <div class="tt-label">WSE</div>
    <div class="tt-count" id="tc-WSE">0 份</div>
  </div>
  <div class="type-tab t-OTHER" onclick="setTypeFilter('OTHER',this)">
    <div class="tt-label">其他驗廠</div>
    <div class="tt-count" id="tc-OTHER">0 份</div>
  </div>
  <div class="type-divider"></div>
  <div class="type-tab t-NA" onclick="setTypeFilter('NA',this)">
    <div class="tt-label">非驗廠文件</div>
    <div class="tt-count" id="tc-NA">0 份</div>
  </div>
  <div class="type-tab t-NA" onclick="setTypeFilter('LOW',this)" style="color:var(--yellow)">
    <div class="tt-label">⚠ 待審查</div>
    <div class="tt-count" id="tc-LOW">0 份</div>
  </div>
</div>

<!-- YEAR FILTER -->
<div id="year-bar" class="hidden">
  <span class="year-label">年份</span>
  <button class="year-chip active" id="yc-ALL" onclick="setYearFilter('ALL',this)">全部年份</button>
  <!-- year chips injected by JS -->
</div>

<div id="pbar"><div id="pfill"></div></div>

<main>
  <!-- LEFT -->
  <div id="left">
    <div id="dropzone">
      <input type="file" id="file-input" multiple accept="*/*" onchange="handleFiles(this.files)">
      <input type="file" id="folder-input" webkitdirectory multiple style="display:none" onchange="handleFiles(this.files)">
      <div class="dz-icon">⬆</div>
      <div class="dz-title">拖放 / 點擊上傳</div>
      <div class="dz-sub">任何格式都可以丟<br>AI 自動識別類型與性質</div>
      <div class="fmt-row">
        <span class="fmt">PDF</span><span class="fmt">Word</span><span class="fmt">Excel</span>
        <span class="fmt">圖片</span><span class="fmt">Email</span><span class="fmt">其他</span>
      </div>
      <button id="folder-btn" style="position:relative;z-index:10;margin-top:10px;padding:5px 14px;border-radius:6px;border:1px solid var(--bd);background:var(--s1);color:var(--muted);font-family:DM Mono,monospace;font-size:11px;cursor:pointer">📁 選擇整個資料夾</button>
    </div>
    <div class="qhdr">文件佇列 <span class="qcount" id="qc">0</span></div>
    <div id="qlist"></div>
  </div>

  <!-- RIGHT -->
  <div id="right">
    <div class="empty" id="empty-state">
      <div class="empty-ico">📂</div>
      <div class="empty-t">請上傳驗廠相關文件</div>
      <div class="empty-s">證書、報告、SOP、Know-how、顧問文件…任何格式都可以<br><br>AI 分析後可依驗廠類型（WRAP/GRS/WSE）和年份篩選</div>
    </div>
    <div id="cards" style="display:none"></div>
    <div id="filter-empty" class="filter-empty" style="display:none">目前篩選條件下沒有文件</div>
  </div>
</main>

<script>
// ════════════════════════════════════════════════
// MULTI-TAG HELPERS
// ════════════════════════════════════════════════
function getTypes(item){ return item.result?.auditTypes||[] }
function primaryType(item){
  const ts=getTypes(item);
  if(!ts.length||ts[0]==='NA')return 'NA';
  return ts[0];
}
function hasType(item,t){return getTypes(item).includes(t)}
function stripeForTypes(types){
  const colors={'WRAP':'#5b8aff','GRS':'#2fd49c','WSE':'#f0c040','OTHER':'#a07cff','NA':'#5a6072'};
  const valid=types.filter(t=>t!=='NA');
  if(!valid.length)return 'var(--na)';
  if(valid.length===1)return colors[valid[0]]||'var(--bd)';
  const stops=valid.map((t,i)=>{ const c=colors[t]||'#888'; const p1=Math.round(i/valid.length*100); const p2=Math.round((i+1)/valid.length*100); return `${c} ${p1}%,${c} ${p2}%`; });
  return `linear-gradient(180deg,${stops.join(',')})`;
}

dz.addEventListener('drop',async e=>{
  e.preventDefault();dz.classList.remove('over');
  showToast('📂 掃描資料夾中…');
  const files=[];
  if(e.dataTransfer.items&&e.dataTransfer.items.length){
    const entries=[];
    for(const item of e.dataTransfer.items){
      const en=item.webkitGetAsEntry?item.webkitGetAsEntry():null;
      if(en) entries.push(en);
      else if(item.kind==='file'){const f=item.getAsFile();if(f)files.push(f);}
    }
    await Promise.all(entries.map(en=>traverseEntry(en,files)));
  } else {
    files.push(...e.dataTransfer.files);
  }
  handleFiles(files);
});

function traverseEntry(entry,out){
  return new Promise(resolve=>{
    if(!entry){resolve();return;}
    if(entry.isFile){
      entry.file(f=>{out.push(f);resolve();},()=>resolve());
    } else if(entry.isDirectory){
      const reader=entry.createReader();
      const batch=[];
      function read(){
        reader.readEntries(async chunk=>{
          if(!chunk||!chunk.length){
            await Promise.all(batch.map(e=>traverseEntry(e,out)));
            resolve();
          } else { batch.push(...chunk); read(); }
        },()=>resolve());
      }
      read();
    } else resolve();
  });
}

function handleFiles(files) {
  const arr = Array.isArray(files) ? [...files] : [...files];
  if(!arr.length){ showToast('沒有讀到任何檔案'); return; }
  const SKIP = new Set(['ds_store','.ds_store','thumbs.db','desktop.ini']);
  const SKIP_EXT = new Set(['ini','lnk','tmp','exe','dll','sys','db']);
  let added = 0;
  for(const f of arr){
    if(!f || !f.name) continue;
    if(f.name.startsWith('.')) continue;
    if(SKIP.has(f.name.toLowerCase())) continue;
    const dotIdx = f.name.lastIndexOf('.');
    const ext = dotIdx >= 0 ? f.name.slice(dotIdx+1).toLowerCase() : '';
    if(SKIP_EXT.has(ext)) continue;
    queue.push({
      id: uid(), file: f, name: f.name,
      ext: ext ? ext.toUpperCase() : 'FILE',
      status: 'pending', result: null, corrected: false, accepted: false
    });
    added++;
  }
  showToast(added > 0 ? '✓ 加入 '+added+' 個檔案，開始分析…' : '沒有讀到檔案，請再試一次');
  renderQueue(); showMain(); updateTypeCounts();
  if(!busy) processNext();
}

function pillOf(item){

function extIco(e){

async function processNext(){
  const next=queue.find(i=>i.status==='pending');
  if(!next){busy=false;updatePbar();return}
  busy=true;next.status='analyzing';
  renderQueue();renderCard(next);updatePbar();
  try{
    const content=await toContent(next.file);
    const raw=await callClaude(content);
    const result=JSON.parse(raw.replace(/```json|```/g,'').trim());
    const dupR=dupCheck(result,next.id);
    result.isDuplicate=!!dupR;result.duplicateReason=dupR||null;
    next.result=result;next.status='done';
  }catch(e){
    next.result={summary:'分析失敗：'+e.message,auditTypes:['NA'],isShared:false,docType:'other',
      auditTypeConfidence:0,docTypeConfidence:0,error:e.message};
    next.status='error';
  }
  renderQueue();renderCard(next);
  updateTypeCounts();updateYearChips();updatePbar();applyFilters();
  setTimeout(processNext,300);
}
async function toContent(file){
  const ext=file.name.split('.').pop().toLowerCase();
  if(ext==='pdf'){const b=await b64(file);return[{type:'document',source:{type:'base64',media_type:'application/pdf',data:b}},{type:'text',text:`檔案名稱：${file.name}\n請分析此驗廠文件。`}]}
  if(['png','jpg','jpeg','gif','bmp'].includes(ext)){const m={png:'image/png',jpg:'image/jpeg',jpeg:'image/jpeg',gif:'image/gif',bmp:'image/bmp'}[ext];const b=await b64(file);return[{type:'image',source:{type:'base64',media_type:m,data:b}},{type:'text',text:`檔案名稱：${file.name}`}]}
  const t=await txt(file);return[{type:'text',text:`檔案名稱：${file.name}\n\n文件內容：\n${t.slice(0,8000)}`}]
}
async function callClaude(content){
  const key=getKey();
  if(!key)throw new Error('未設定 Gemini API Key — 請在上方輸入');
  // Build Gemini request — merge system prompt into first user turn
  const parts=[];
  if(Array.isArray(content)){
    for(const c of content){
      if(c.type==='text') parts.push({text:c.text});
      else if(c.type==='image') parts.push({inline_data:{mime_type:c.source.media_type,data:c.source.data}});
      else if(c.type==='document') parts.push({inline_data:{mime_type:'application/pdf',data:c.source.data}});
    }
  } else {
    parts.push({text:String(content)});
  }
  const body={
    system_instruction:{parts:[{text:SYSTEM}]},
    contents:[{role:'user',parts}],
    generationConfig:{maxOutputTokens:1500,temperature:0.1}
  };
  const MODEL='gemini-2.0-flash';
  const ENDPOINT=`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key}`;
  const r=await fetch(ENDPOINT,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){const t=await r.text().catch(()=>'');throw new Error(`Gemini API ${r.status}${t?' — '+t.slice(0,200):''}`);}
  const d=await r.json();
  const text=d.candidates?.[0]?.content?.parts?.[0]?.text||'{}';
  return text;
}

function b64(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(f)})}
function txt(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsText(f,'utf-8')})}
function dupCheck(result,cid){
  const newTypes=result.auditTypes||[];
  if(result.isShared)return null; // shared docs are not flagged as duplicates
  const done=queue.filter(i=>i.id!==cid&&i.status==='done'&&i.result&&!i.result.isDuplicate&&!i.result.isShared);
  for(const item of done){const r=item.result;const rTypes=r.auditTypes||[];
    if(rTypes.includes('NA'))continue;
    const overlap=newTypes.some(t=>rTypes.includes(t)&&t!=='NA');
    if(overlap){
      if(result.certNo&&r.certNo&&result.certNo===r.certNo)return`與「${item.name}」證書編號相同`;
      if(result.auditDate&&r.auditDate&&result.auditDate===r.auditDate&&sim(result.auditName||'',r.auditName||'')>0.7)return`與「${item.name}」驗廠類型與日期相同`;
    }}return null;
}
function sim(a,b){a=a.toLowerCase().replace(/\s/g,'');b=b.toLowerCase().replace(/\s/g,'');if(a===b)return 1;const l=a.length>b.length?a:b,s=a.length>b.length?b:a;let m=0;for(let i=0;i<s.length;i++)if(l.includes(s[i]))m++;return m/l.length}

    if(filterType==='LOW'){show=item.status==='done'&&(isLowConf(item)||r?.isDuplicate)&&!item.accepted}

      if(['WRAP','GRS','WSE'].includes(filterType))show=types.includes(filterType);

  const container=document.getElementById('cards');
  let card=document.getElementById('card-'+item.id);
  if(!card){card=document.createElement('div');card.id='card-'+item.id;container.appendChild(card)}
  const r=item.result;
  const types=getTypes(item);
  const isShared=r?.isShared&&types.filter(t=>t!=='NA').length>1;
  const stripeStyle=isShared?`background:${stripeForTypes(types)}`:`background:${({'WRAP':'var(--wrap)','GRS':'var(--grs)','WSE':'var(--wse)','OTHER':'var(--other)','NA':'var(--na)'}[types[0]]||'var(--bd)')}`;
  const isLow=item.status==='done'&&isLowConf(item)&&!item.accepted;
  card.className=`rcard${r?.isDuplicate&&!item.accepted?' dup':''}${isLow?' low':''}${item.accepted?' accepted':''}`;

  if(item.status==='analyzing'){
    card.innerHTML=`<div class="ch"><div class="ch-stripe" style="background:var(--accent)"></div>
      <div class="ch-body"><div class="ch-ico">${extIco(item.ext)}</div>
        <div class="ch-info"><div class="ch-fname">${item.name}</div></div>
        <div class="ch-right"><span class="spill sp-r">分析中</span></div>
      </div></div>
      <div class="cb"><div class="analyzing-row"><div class="spin"></div><span>AI 正在識別驗廠類型與文件性質…</span></div></div>`;
    return;
  }
  if(item.status==='error'){
    card.innerHTML=`<div class="ch"><div class="ch-stripe" style="background:var(--red)"></div>
      <div class="ch-body"><div class="ch-ico">${extIco(item.ext)}</div>
        <div class="ch-info"><div class="ch-fname">${item.name}</div></div>
        <div class="ch-right"><span class="spill sp-e">錯誤</span></div>
      </div></div>
      <div class="cb"><div style="color:var(--red);font-size:12px;margin-bottom:12px">⚠ ${r?.error||'分析失敗'}</div>
        ${corrHTML(item)}
        <div class="actions"><button class="abtn acc" onclick="acceptItem('${item.id}')">✓ 手動歸檔</button><button class="abtn del" onclick="removeItem('${item.id}')">✕ 移除</button></div>
      </div>`;
    return;
  }
  if(!r)return;

  const atConf=((r.auditTypeConfidence||0)*100).toFixed(0);
  const dtConf=((r.docTypeConfidence||0)*100).toFixed(0);
  const cc=c=>c>=70?'var(--green)':c>=50?'var(--yellow)':'var(--red)';
  const typeColors={'WRAP':'var(--wrap)','GRS':'var(--grs)','WSE':'var(--wse)','OTHER':'var(--other)','NA':'var(--na)'};
  const classSuffix=t=>['WRAP','GRS','WSE'].includes(t)?t:t==='NA'?'NA':'OTHER';

  // multi audit type badges
  const atBadges=types.filter(t=>t!=='NA').length
    ? types.filter(t=>t!=='NA').map(t=>`<span class="at-badge at-${classSuffix(t)}">${t}</span>`).join('')
    : `<span class="at-badge at-NA">非驗廠</span>`;
  const sharedFlag=isShared?`<span class="flag-shared">⟳ 共享文件</span>`:'';
  const dtSmall=r.docType?`<span class="dt-badge dt-${r.docType}">${DOC_TYPES[r.docType]||r.docType}</span>`:'';
  const dupFlag=r.isDuplicate?`<span class="flag-dup">⚠ 重複</span>`:'';
  const lowFlag=isLow?`<span class="flag-low">⚠ 低信心</span>`:'';
  const accMark=item.accepted?`<span style="font-size:11px;color:var(--green)">✓ 歸檔</span>`:'';
  const yearStr=yearOf(item);
  const corrMark=item.corrected?`<span style="font-size:9px;color:var(--yellow)">✎ 已修正</span>`:'';

  card.innerHTML=`
    <div class="ch" onclick="toggleBody('cb-${item.id}')">
      <div class="ch-stripe" style="${stripeStyle}"></div>
      <div class="ch-body">
        <div class="ch-ico">${extIco(item.ext)}</div>
        <div class="ch-info">
          <div class="ch-fname">${item.name}</div>
          <div class="ch-sub">
            ${r.auditName?`<span>${r.auditName}</span>`:''}
            ${yearStr?`<span style="color:var(--muted)">${yearStr}年</span>`:''}
            ${r.issuer?`<span style="color:var(--muted)">${r.issuer}</span>`:''}
            ${corrMark}
          </div>
        </div>
        <div class="ch-right" style="flex-wrap:wrap;justify-content:flex-end;gap:5px;max-width:280px">${atBadges}${sharedFlag}${dtSmall}${dupFlag}${lowFlag}${accMark}<span style="color:var(--muted);font-size:11px">▾</span></div>
      </div>
    </div>
    <div id="cb-${item.id}" class="cb" style="display:none">
      ${r.isDuplicate?`<div class="warn-box">⚠ <div><strong>偵測到重複文件</strong><br>${r.duplicateReason}</div></div>`:''}
      ${isShared?`<div class="shared-info">⟳ <div><strong>共享文件</strong>　此文件同時適用多個驗廠類型<br>${r.sharedReason||''}
        <div class="shared-tags">${types.filter(t=>t!=='NA').map(t=>`<span class="at-badge at-${classSuffix(t)}" style="font-size:11px">${t}</span>`).join('')}</div>
      </div></div>`:''}
      ${isLow?`<div class="low-box">⚠ <div><strong>AI 分類信心不足，請確認</strong>${r.lowConfidenceReason?'<br>'+r.lowConfidenceReason:''}</div></div>`:''}
      ${r.summary?`<div class="sum-box">${r.summary}</div>`:''}

      <div class="conf-row">
        <div class="conf-lbl">驗廠類型信心 ${atConf}%</div>
        <div class="conf-bar"><div class="conf-fill" style="width:${atConf}%;background:${cc(+atConf)}"></div></div>
        <div class="conf-pct" style="color:${cc(+atConf)}">${atConf}%</div>
      </div>
      <div class="conf-row" style="margin-bottom:14px">
        <div class="conf-lbl">文件性質信心 ${dtConf}%</div>
        <div class="conf-bar"><div class="conf-fill" style="width:${dtConf}%;background:${cc(+dtConf)}"></div></div>
        <div class="conf-pct" style="color:${cc(+dtConf)}">${dtConf}%</div>
      </div>

      <div class="dgrid">
        ${df('文件種類',DOC_TYPES[r.docType])}
        ${df('文件來源',DOC_SOURCE[r.docSource])}
        ${df('驗廠名稱',r.auditName)}
        ${df('驗廠日期',r.auditDate)}
        ${df('到期日',r.expiryDate)}
        ${df('證書編號',r.certNo)}
        ${df('等級',r.grade)}
        ${df('發證機構',r.issuer)}
        ${df('認證範圍',r.scope)}
        ${df('分數',r.score)}
        ${df('NC 數',r.ncCount!=null?r.ncCount+'項':null)}
      </div>
      ${r.ncItems?.length?`<div class="sec-t">NC 不符合事項</div><div class="nc-list">${r.ncItems.map(n=>`<div class="nc-i">• ${n}</div>`).join('')}</div>`:''}
      ${r.keyFindings?.length?`<div class="sec-t">重點發現</div><div class="nc-list">${r.keyFindings.map(f=>`<div class="nc-i find">→ ${f}</div>`).join('')}</div>`:''}

      ${corrHTML(item)}
      <div class="actions">
        ${!item.accepted?`<button class="abtn acc" onclick="acceptItem('${item.id}')">✓ 確認歸檔</button>`:`<span style="color:var(--green);font-size:11px">✓ 已歸檔</span>`}
        <button class="abtn" onclick="reAnalyze('${item.id}')">↺ 重新分析</button>
        <button class="abtn del" onclick="removeItem('${item.id}')">✕ 移除</button>
      </div>
    </div>`;
}

function df(label,val){if(!val)return'';return`<div class="df"><div class="dl">${label}</div><div class="dv">${val}</div></div>`}
function toggleBody(id){const el=document.getElementById(id);if(el)el.style.display=el.style.display==='none'?'block':'none'}
function scrollToCard(id){document.getElementById('card-'+id)?.scrollIntoView({behavior:'smooth',block:'start'})}

function corrHTML(item){
  const r=item.result||{};
  const currentTypes=r.auditTypes||[];
  const allTypes=['WRAP','GRS','WSE','SEDEX','SA8000','ISO','OTHER','NA'];
  const typeColors={'WRAP':'var(--wrap)','GRS':'var(--grs)','WSE':'var(--wse)','SEDEX':'var(--other)','SA8000':'var(--purple)','ISO':'var(--process)','OTHER':'var(--other)','NA':'var(--na)'};
  const checkboxes=allTypes.map(t=>{
    const checked=currentTypes.includes(t)?'checked':'';
    const c=typeColors[t]||'var(--muted)';
    return`<label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:11px;padding:3px 0">
      <input type="checkbox" id="ck-${t}-${item.id}" value="${t}" ${checked} onchange="onCorr('${item.id}')"
        style="accent-color:${c};width:13px;height:13px;cursor:pointer">
      <span style="color:${c};font-weight:600">${t}</span>
    </label>`;
  }).join('');
  return`<div class="corr-box">
    <div class="corr-hdr"><span>✎ 手動修正分類</span>${item.corrected?'<span class="corr-ok">✓ 已修正</span>':''}</div>
    <div style="margin-bottom:10px">
      <div class="cl" style="margin-bottom:6px">驗廠類型（可多選）</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:2px">${checkboxes}</div>
    </div>
    <div class="corr-grid">
      <div class="cf"><div class="cl">文件種類</div>
        <select class="cs" id="cs-dt-${item.id}" onchange="onCorr('${item.id}')">
          ${Object.entries(DOC_TYPES).map(([k,v])=>`<option value="${k}"${r.docType===k?' selected':''}>${v}</option>`).join('')}
        </select></div>
      <div class="cf"><div class="cl">文件來源</div>
        <select class="cs" id="cs-src-${item.id}" onchange="onCorr('${item.id}')">
          ${Object.entries(DOC_SOURCE).map(([k,v])=>`<option value="${k}"${r.docSource===k?' selected':''}>${v}</option>`).join('')}
        </select></div>
      <div class="cf" style="grid-column:1/-1"><div class="cl">備註</div>
        <input class="ci" id="ci-note-${item.id}" placeholder="補充說明…" value="${r.manualNote||''}">
      </div>
    </div></div>`;
}

// ════════════════════════════════════════════════
// ACTIONS
// ════════════════════════════════════════════════
function onCorr(id){
  const item=queue.find(i=>i.id===id);if(!item||!item.result)return;
  const allTypes=['WRAP','GRS','WSE','SEDEX','SA8000','ISO','OTHER','NA'];
  const newTypes=allTypes.filter(t=>document.getElementById(`ck-${t}-${id}`)?.checked);
  const dt=document.getElementById('cs-dt-'+id)?.value;
  const src=document.getElementById('cs-src-'+id)?.value;
  const note=document.getElementById('ci-note-'+id)?.value;
  const changed=JSON.stringify(newTypes)!==JSON.stringify(item.result.auditTypes)||dt!==item.result.docType||src!==item.result.docSource;
  if(changed&&newTypes.length>0){
    item.result.auditTypes=newTypes;
    item.result.isShared=newTypes.filter(t=>t!=='NA').length>1;
    item.result.docType=dt;item.result.docSource=src;item.result.manualNote=note;
    item.corrected=true;
    renderCard(item);renderQueue();updateTypeCounts();applyFilters();
  }
}
function acceptItem(id){
  const item=queue.find(i=>i.id===id);if(!item)return;
  const allTypes=['WRAP','GRS','WSE','SEDEX','SA8000','ISO','OTHER','NA'];
  const newTypes=allTypes.filter(t=>document.getElementById(`ck-${t}-${id}`)?.checked);
  const dt=document.getElementById('cs-dt-'+id)?.value||item.result?.docType;
  const src=document.getElementById('cs-src-'+id)?.value||item.result?.docSource;
  const note=document.getElementById('ci-note-'+id)?.value||'';
  if(item.result){
    if(newTypes.length>0){item.result.auditTypes=newTypes;item.result.isShared=newTypes.filter(t=>t!=='NA').length>1;}
    item.result.docType=dt;item.result.docSource=src;item.result.manualNote=note;
  }
  item.accepted=true;
  renderCard(item);renderQueue();updateTypeCounts();applyFilters();
  document.getElementById('exp-btn').classList.add('on');
}
function reAnalyze(id){
  const item=queue.find(i=>i.id===id);if(!item)return;
  item.status='pending';item.result=null;item.corrected=false;item.accepted=false;
  renderQueue();renderCard(item);updateTypeCounts();applyFilters();
  if(!busy)processNext();
}
function removeItem(id){
  queue=queue.filter(i=>i.id!==id);
  document.getElementById('card-'+id)?.remove();
  renderQueue();updateTypeCounts();updateYearChips();showMain();applyFilters();
}
function clearAll(){
  queue=[];
  document.getElementById('cards').innerHTML='';
  document.getElementById('filter-empty').style.display='none';
  renderQueue();updateTypeCounts();updateYearChips();showMain();
  document.getElementById('exp-btn').classList.remove('on');
  filterType='ALL';filterYear='ALL';
  document.querySelectorAll('.type-tab').forEach((t,i)=>{if(i===0)t.classList.add('active');else t.classList.remove('active')});
  document.getElementById('yc-ALL')?.click();
}
function updatePbar(){
  const total=queue.length,done=queue.filter(i=>i.status==='done'||i.status==='error').length;
  document.getElementById('pbar').style.display=total?'block':'none';
  document.getElementById('pfill').style.width=total?(done/total*100)+'%':'0%';
}
function doExport(){
  const data=queue.filter(i=>i.accepted).map(i=>({fileName:i.name,manuallyCorrected:i.corrected,...i.result}));
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download=`VRT_Audits_${new Date().toISOString().split('T')[0]}.json`;a.click();
}
</script>
</body>
</html>
